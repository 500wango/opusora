app-id: local.opusora.Opusora
runtime: org.kde.Platform
runtime-version: "6.7"
sdk: org.kde.Sdk
command: opusora
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --share=ipc
  - --filesystem=xdg-music:ro
  - --filesystem=home:ro
modules:
  - name: opusora
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: ../..
